name: C Docker GHCR CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/c-docker-ghcr-runner

jobs:
  build-test-push-deploy:
    runs-on: [self-hosted, windows]

    steps:
      - name: 1. Checkout source
        uses: actions/checkout@v4

      - name: 2. Show Docker version
        shell: powershell
        run: docker version

      - name: 3. Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 4. Build Docker image
        shell: powershell
        run: |
          # 1. ผานฎภฺทฮ บฏศฏวฯฟฉ ศฏฐๆ บฏผ๖ฟก ภ๚ภๅ
          $LOWER_NAME = "${{ env.IMAGE_NAME }}".ToLower()
          
          # 2. บ๔ตๅ ฝววเ (บฏผ๖ พีฟก $ธฆ บูฟฉ ป็ฟ๋)
          docker build -t "${LOWER_NAME}:latest" .

      - name: 5. Run container test
        shell: powershell
        run: |
          # 1. ฑโมธ ฤมลืภฬณส ป่มฆ (ฟกทฏฐก ณชตต นซฝรวฯฐํ ม๘วเ)
          docker rm -f c-test-container 2>$null | Out-Null

          # 2. ภฬนฬม๖ ภฬธงภป ผานฎภฺทฮ บฏศฏ
          $LOWER_IMAGE = "${{ env.IMAGE_NAME }}".ToLower()

          # 3. ฤมลืภฬณส ฝววเ นื ฐแฐ๚ ภ๚ภๅ
          docker run --name c-test-container "${LOWER_IMAGE}:latest" > output.txt

          # 4. ฐแฐ๚ รโทย นื ฐหม๕
          Get-Content output.txt
          if (Select-String -Path output.txt -Pattern "sum = 30") {
              Write-Host "Test Passed!"
          } else {
              Write-Error "Test Failed: Pattern 'sum = 30' not found."
              exit 1
          }

          # 5. ฤมลืภฬณส มคธฎ
          docker rm -f c-test-container

      - name: 6. Push image to GHCR
        shell: powershell
        run: |
          docker push "${env:IMAGE_NAME}:latest"

      - name: 7. Deploy with Docker Compose
        shell: powershell
        run: |
          docker compose down
          docker compose pull
          docker compose up -d

      - name: 8. Verify running container
        shell: powershell
        run: docker ps

