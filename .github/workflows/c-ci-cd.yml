name: C Docker GHCR CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/c-docker-ghcr-runner

jobs:
  build-test-push-deploy:
    runs-on: [self-hosted, windows]

    steps:
      - name: 1. Checkout source
        uses: actions/checkout@v4

      - name: 2. Show Docker version
        shell: powershell
        run: docker version

      - name: 3. Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 4. Build Docker image
        shell: powershell
        run: |
          # 1. 소문자로 변환하여 환경 변수에 저장
          $LOWER_NAME = "${{ env.IMAGE_NAME }}".ToLower()
          
          # 2. 빌드 실행 (변수 앞에 $를 붙여 사용)
          docker build -t "${LOWER_NAME}:latest" .

      - name: 5. Run container test
        shell: powershell
        run: |
          # 1. 에러가 나도 스크립트를 중단하지 않도록 설정
          $ErrorActionPreference = "Continue"

          # 2. 기존 컨테이너 삭제 (에러 무시)
          docker rm -f c-test-container 2>&1 | Out-Null

          # 3. 이미지 이름을 소문자로 변환 (대문자 문제 방지)
          $LOWER_IMAGE = "${{ env.IMAGE_NAME }}".ToLower()

          # 4. 컨테이너 실행 및 결과 저장
          docker run --name c-test-container "${LOWER_IMAGE}:latest" > output.txt

          # 5. 결과 확인 및 검증
          if (Test-Path output.txt) {
              Get-Content output.txt
              if (Select-String -Path output.txt -Pattern "sum = 30") {
                  Write-Host "? Test Passed!"
              } else {
                  Write-Error "? Test Failed: Pattern 'sum = 30' not found."
                  exit 1
              }
          }

          # 6. 마무리 정리
          docker rm -f c-test-container 2>&1 | Out-Null
      - name: 6. Push image to GHCR
        shell: powershell
        run: |
          # 소문자로 변환된 변수 생성
          $LOWER_IMAGE = "${{ env.IMAGE_NAME }}".ToLower()
          
          # 변환된 변수로 푸시
          docker push "${LOWER_IMAGE}:latest"

      - name: 7. Deploy with Docker Compose
        shell: powershell
        run: |
          docker compose down --remove-orphans
          docker compose pull
          docker compose up -d --force-recreate

      - name: 8. Verify running container
        shell: powershell
        run: docker ps

