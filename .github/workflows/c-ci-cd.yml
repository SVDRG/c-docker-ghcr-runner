name: C Docker GHCR CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME을 여기서 바로 정의하지 않고, 아래 Job의 Step에서 소문자로 변환하여 사용합니다.

jobs:
  build-test-push-deploy:
    runs-on: [self-hosted, windows]

    steps:
      - name: 1. Checkout source
        uses: actions/checkout@v4

      # [중요] 여기서 대문자가 포함된 ID를 소문자로 변환하여 환경 변수에 저장합니다.
      - name: 2. Set Case-insensitive Image Name
        shell: powershell
        run: |
          $owner = "${{ github.repository_owner }}".ToLower()
          $image_path = "ghcr.io/$owner/c-docker-ghcr-runner"
          echo "IMAGE_NAME=$image_path" >> $env:GITHUB_ENV

      - name: 3. Show Docker version
        shell: powershell
        run: docker version

      - name: 4. Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Build Docker image
        shell: powershell
        run: |
          docker build -t $env:IMAGE_NAME:latest .

      - name: 6. Run container test
        shell: powershell
        run: |
          if (docker ps -a -q --filter "name=c-test-container") {
              docker rm -f c-test-container
          }
          docker run --name c-test-container $env:IMAGE_NAME:latest > output.txt
          Get-Content output.txt
          if (Select-String -Path output.txt -Pattern "sum = 30") {
              Write-Host "Test Passed!"
          } else {
              Write-Error "Test Failed!"
              exit 1
          }
          docker rm -f c-test-container

      - name: 7. Push image to GHCR
        shell: powershell
        run: |
          docker push $env:IMAGE_NAME:latest

      - name: 8. Deploy with Docker Compose
        shell: powershell
        run: |
          docker compose down
          docker compose pull
          docker compose up -d

      - name: 9. Verify running container
        shell: powershell
        run: docker ps


