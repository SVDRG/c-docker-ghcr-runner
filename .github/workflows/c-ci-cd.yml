name: C Docker GHCR CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # IMAGE_NAMEภป ฟฉฑโผญ นูทฮ มคภววฯม๖ พสฐํ, พฦทก Jobภว Stepฟกผญ ผานฎภฺทฮ บฏศฏวฯฟฉ ป็ฟ๋วีดฯดู.

jobs:
  build-test-push-deploy:
    runs-on: [self-hosted, windows]

    steps:
      - name: 1. Checkout source
        uses: actions/checkout@v4

      # [ม฿ฟไ] ฟฉฑโผญ ด๋นฎภฺฐก ฦ๗วิตศ IDธฆ ผานฎภฺทฮ บฏศฏวฯฟฉ ศฏฐๆ บฏผ๖ฟก ภ๚ภๅวีดฯดู.
      - name: 2. Set Case-insensitive Image Name
        shell: powershell
        run: |
          $owner = "${{ github.repository_owner }}".ToLower()
          $image_path = "ghcr.io/$owner/c-docker-ghcr-runner"
          echo "IMAGE_NAME=$image_path" >> $env:GITHUB_ENV

      - name: 3. Show Docker version
        shell: powershell
        run: docker version

      - name: 4. Build Docker image
        shell: powershell
        run: |
          # บฏผ๖ธํภป { }ทฮ ฐจฝฮผญ :latestฟอ ศฎฝวศ๗ บะธฎวีดฯดู.
          docker build -t "${env:IMAGE_NAME}:latest" .

      - name: 5. Build Docker image
        shell: powershell
        run: |
          docker build -t $env:IMAGE_NAME:latest .

      - name: 6. Run container test
        shell: powershell
        run: |
          docker rm -f c-test-container 2>$null
          # ฟฉฑโตต ธถย๙ฐกม๖ทฮ ผ๖มค
          docker run --name c-test-container "${env:IMAGE_NAME}:latest" > output.txt
          Get-Content output.txt
          Select-String -Path output.txt -Pattern "sum = 30"
          docker rm -f c-test-container

      - name: 7. Push image to GHCR
        shell: powershell
        run: |
          # ฟฉฑโตต ธถย๙ฐกม๖ทฮ ผ๖มค
          docker push "${env:IMAGE_NAME}:latest"

      - name: 8. Deploy with Docker Compose
        shell: powershell
        run: |
          docker compose down
          docker compose pull
          docker compose up -d

      - name: 9. Verify running container
        shell: powershell
        run: docker ps


